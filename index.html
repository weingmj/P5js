<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 비주얼 포트폴리오</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <style>
    /* 기본 초기화 및 폰트 설정 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    /* 부드러운 그라데이션 배경 적용 */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      color: #333;
    }

    /* 상단 헤더 스타일 */
    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1rem;
      color: #666;
    }

    /* 2행 2열 그리드 레이아웃 */
    #projects {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      width: 100%;
      max-width: 800px;
    }

    /* 카드 UI 스타일링 */
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 마우스 오버 시 떠오르는 애니메이션 효과 */
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-weight: 600;
      font-size: 1.2rem;
    }

    .badge {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: #eef2f5;
      color: #555;
      font-weight: 500;
    }

    /* 캔버스(600x400)를 카드 크기에 맞게 0.5배 축소하는 컨테이너 */
    .iframe-wrapper {
      width: 300px;
      height: 200px;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: #fafafa;
      border: 1px solid #eee;
    }

    .iframe-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 400px;
      border: none;
      transform-origin: top left;
      transform: scale(0.5);
    }

    /* 반응형: 화면이 작아지면 1열로 변경 */
    @media (max-width: 768px) {
      #projects {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>p5.js 인터랙티브 갤러리</h1>
    <p>위명준의 비주얼 포트폴리오</p>
  </header>

  <main id="projects">
    <div class="card">
      <div class="card-title">
        <span>과제 1: [작품 제목 1]</span>
        <span class="badge">정적</span>
      </div>
      <div class="iframe-wrapper">
        <iframe src="sample1/index.html"></iframe>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>과제 4: [작품 제목 4]</span>
        <span class="badge">동적</span>
      </div>
      <div class="iframe-wrapper">
        <iframe src="sample4/index.html"></iframe>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>과제 2: [작품 제목 2]</span>
        <span class="badge">동적</span>
      </div>
      <div class="iframe-wrapper">
        <iframe src="sample2/index.html"></iframe>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>과제 3: [작품 제목 3]</span>
        <span class="badge">동적</span>
      </div>
      <div class="iframe-wrapper">
        <iframe src="sample3/index.html"></iframe>
      </div>
    </div>
  </main>

</body>
</html>
